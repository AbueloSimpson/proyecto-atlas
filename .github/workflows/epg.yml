name: Refresh iptv-org EPG

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Select channels to grab
        run: node scripts/select-epg-channels.js epg-channels.xml

      - name: Clone iptv-org/epg grabber
        run: git clone --depth 1 -b master https://github.com/iptv-org/epg.git epg-grabber

      - name: Install grabber dependencies
        working-directory: epg-grabber
        run: npm install --no-audit --no-fund

      - name: Run grab
        working-directory: epg-grabber
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          node node_modules/tsx/dist/cli.mjs scripts/commands/epg/grab.ts \
            --channels=../epg-channels.xml \
            --output=../guide.xml \
            --days=1 \
            --maxConnections=10 \
            --timeout=10000

      - name: Convert grabber output to JSON
        run: |
          mkdir -p output
          node scripts/convert-epg-output.js guide.xml output/epg-iptvorg.json

      - name: Push to data branch
        run: |
          rm -f epg-channels.xml guide.xml
          mkdir -p output registry
          cp docs/data-readme.md README.md
          git config user.name "proyecto-atlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin data 2>/dev/null || true
          git checkout origin/data -- output/index.json output/continents output/countries \
            output/categories registry/numbers.json registry/country-blocks.json 2>/dev/null || true
          git checkout --orphan data-tmp
          git rm -rf --cached . > /dev/null
          git add -f README.md output/epg-iptvorg.json
          [ -f output/index.json ] && git add -f output/index.json output/continents output/countries output/categories || true
          [ -f registry/numbers.json ] && git add -f registry/numbers.json registry/country-blocks.json || true
          git commit -m "chore: refresh iptv-org EPG"
          git push --force origin data-tmp:data
