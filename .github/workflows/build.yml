name: Build channel index

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch current data branch state
        run: |
          mkdir -p output registry
          git fetch origin data 2>/dev/null || true
          git show origin/data:registry/numbers.json > registry/numbers.json 2>/dev/null || true
          git show origin/data:registry/country-blocks.json > registry/country-blocks.json 2>/dev/null || true
          git show origin/data:output/epg-iptvorg.json > output/epg-iptvorg.json 2>/dev/null || true

      - name: Run build
        run: node scripts/build.js

      - name: Push to data branch
        run: |
          cp docs/data-readme.md README.md
          git config user.name "proyecto-atlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout --orphan data-tmp
          git rm -rf --cached . > /dev/null
          git add -f README.md output/index.json output/continents output/countries output/categories \
            output/epg-iptvorg.json registry/numbers.json registry/country-blocks.json
          git commit -m "chore: refresh channel index"
          git push --force origin data-tmp:data
