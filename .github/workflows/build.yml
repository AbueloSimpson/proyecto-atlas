name: Build channel index

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run build
        run: node scripts/build.js

      - name: Commit updated output
        run: |
          git config user.name "proyecto-atlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output/streams.json registry/numbers.json registry/country-blocks.json
          git diff --staged --quiet || git commit -m "chore: refresh channel index"
          git push
